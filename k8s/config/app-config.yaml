apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
data:
  SPRING_PROFILES_ACTIVE: prod
  REDIS_HOST: redis-service
  REDIS_PORT: "6379"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: db-config
data:
  POSTGRES_DB: ecommerce
  POSTGRES_USER: postgresuser
  # Using schemas for logical separation in a single Postgres instance
  DB_URL_ORDER: jdbc:postgresql://postgres-service:5432/ecommerce?currentSchema=orders
  DB_URL_PAYMENT: jdbc:postgresql://postgres-service:5432/ecommerce?currentSchema=payments
  DB_URL_SHIPPING: jdbc:postgresql://postgres-service:5432/ecommerce?currentSchema=shipping
---
apiVersion: v1
kind: Secret
metadata:
  name: db-secret
type: Opaque
data:
  # 'postgrespassword' in base64: cG9zdGdyZXNwYXNzd29yZA==
  POSTGRES_PASSWORD: cG9zdGdyZXNwYXNzd29yZA==
